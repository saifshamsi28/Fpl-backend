services:
  - type: web
    name: fpl-backend
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/teams
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: DB_MAX_POOL_SIZE
        value: 2
      - key: DB_MIN_IDLE
        value: 0
      - key: FLYWAY_CONNECT_RETRIES
        value: 10
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
