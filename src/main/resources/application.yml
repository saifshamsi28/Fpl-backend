server:
  port: ${SERVER_PORT:${PORT:8080}}

spring:
  application:
    name: zpl-handcricket-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:240000}
      keepalive-time: ${DB_KEEPALIVE_MS:120000}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    connect-retries: ${FLYWAY_CONNECT_RETRIES:5}

app:
  jwt:
    secret: ${JWT_SECRET}
    expirationHours: 720   # 30 days

logging:
  level:
    com.zpl: INFO
    org.springframework.web.socket: INFO
